# docker-compose.yml
services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - manager
    networks:
      - crackhash-net
    restart: unless-stopped

  manager:
    build: ./manager           # ← build context = ./manager
    environment:
      - WORKER_CALLBACK_URL=http://manager:8000
      - TASK_TIMEOUT=5
      - MAX_RETRIES=3
    networks:
      - crackhash-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  worker:
    build: ./worker            # ← build context = ./worker
    deploy:
      replicas: ${WORKERS_COUNT:-4}
    environment:
      - MANAGER_URL=http://manager:8000
      - WORKER_ID=${WORKER_ID:-auto}
    networks:
      - crackhash-net
    depends_on:
      manager:
        condition: service_healthy
    restart: unless-stopped

networks:
  crackhash-net:
    driver: bridge